<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PP-OCR 日本語 検証 (実験)</title>
<style>
  :root{ --bg:#fff; --fg:#111; --muted:#888; --line:#e6e6e6; --accent:#111; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--fg);
        font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
        line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:760px; margin:0 auto; padding:28px 20px 80px; }
  h1{ font-size:20px; font-weight:600; margin:0 0 4px; }
  .sub{ color:var(--muted); font-size:13px; margin-bottom:24px; }
  .card{ border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:18px; }
  label.btn, button{ font:inherit; }
  .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  button, label.file{ border:1px solid var(--fg); background:var(--fg); color:#fff;
        padding:9px 16px; border-radius:8px; cursor:pointer; font-size:14px; }
  label.file{ background:#fff; color:var(--fg); }
  button:disabled{ opacity:.4; cursor:default; }
  #preview{ max-width:100%; max-height:280px; margin-top:14px; border:1px solid var(--line); border-radius:8px; display:none; }
  .status{ font-size:13px; color:var(--muted); margin-top:12px; min-height:20px; }
  textarea{ width:100%; min-height:140px; border:1px solid var(--line); border-radius:8px;
        padding:10px; font:13px/1.5 ui-monospace,Menlo,Consolas,monospace; resize:vertical; color:var(--fg); }
  .fields{ display:grid; grid-template-columns:90px 1fr; gap:8px 12px; font-size:14px; }
  .fields .k{ color:var(--muted); }
  .fields .v{ font-weight:500; word-break:break-all; }
  h2{ font-size:14px; font-weight:600; margin:0 0 12px; }
  .note{ font-size:12px; color:var(--muted); margin-top:8px; }
  code{ background:#f4f4f4; padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>PP-OCR 日本語 認識テスト</h1>
  <div class="sub">実験ページ。画像はブラウザ内だけで処理され、外部には送信されません。モデル(約15MB)は初回のみHugging FaceからDLします。</div>

  <div class="card">
    <div class="row">
      <label class="file">画像を選択
        <input id="file" type="file" accept="image/*" hidden>
      </label>
      <button id="run" disabled>認識する</button>
      <span id="eng" class="note">エンジン読み込み中…</span>
    </div>
    <img id="preview" alt="">
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>自動割り当て結果</h2>
    <div class="fields">
      <div class="k">氏名</div><div class="v" id="f_name">—</div>
      <div class="k">会社</div><div class="v" id="f_company">—</div>
      <div class="k">役職</div><div class="v" id="f_title">—</div>
      <div class="k">メール</div><div class="v" id="f_email">—</div>
      <div class="k">電話</div><div class="v" id="f_phone">—</div>
    </div>
  </div>

  <div class="card">
    <h2>認識した生テキスト</h2>
    <textarea id="raw" placeholder="ここに認識結果が出ます" readonly></textarea>
    <div class="note">読み取りが崩れる場合はこのテキストを見せてください。検出枠・並び順の調整に使います。</div>
  </div>
</div>

<script type="module">
const $ = id => document.getElementById(id);
const DET  = "https://huggingface.co/SWHL/RapidOCR/resolve/main/PP-OCRv4/ch_PP-OCRv4_det_infer.onnx";
const REC  = "https://huggingface.co/cycloneboy/japan_PP-OCRv4_rec_infer/resolve/main/model.onnx";
const DICT = "https://huggingface.co/cycloneboy/japan_PP-OCRv4_rec_infer/resolve/main/japan_dict.txt";

let ocr = null, currentUrl = null;

(async () => {
  try{
    const { default: Ocr } = await import("https://esm.sh/@gutenye/ocr-browser@1.4.8?bundle-deps");
    ocr = await Ocr.create({
      models: { detectionPath: DET, recognitionPath: REC, dictionaryPath: DICT }
    });
    $("eng").textContent = "エンジン準備OK";
    if(currentUrl) $("run").disabled = false;
  }catch(e){
    $("eng").textContent = "エンジン読み込み失敗: " + (e && e.message ? e.message : e);
    console.error(e);
  }
})();

$("file").addEventListener("change", e => {
  const f = e.target.files[0];
  if(!f) return;
  if(currentUrl) URL.revokeObjectURL(currentUrl);
  currentUrl = URL.createObjectURL(f);
  const img = $("preview");
  img.src = currentUrl; img.style.display = "block";
  $("run").disabled = !ocr;
  $("status").textContent = "";
});

$("run").addEventListener("click", async () => {
  if(!ocr || !currentUrl) return;
  $("run").disabled = true;
  $("status").textContent = "認識中…(画像サイズにより数秒〜十数秒)";
  try{
    const result = await ocr.detect(currentUrl, {});
    const lines = (result.texts || [])
      .slice()
      .sort((a,b)=> (a.frame.top - b.frame.top) || (a.frame.left - b.frame.left))
      .map(t => t.text);
    const text = lines.join("\n");
    $("raw").value = text || "(認識できませんでした)";
    extractFields(text);
    $("status").textContent = "完了。検出 " + lines.length + " 行。";
  }catch(e){
    $("status").textContent = "認識に失敗: " + (e && e.message ? e.message : e);
    console.error(e);
  }finally{
    $("run").disabled = false;
  }
});

/* ---- field assignment (same heuristics as the app) ---- */
function toHalf(s){
  return (s||"").replace(/[！-～]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/　/g," ");
}
function extractFields(text){
  const out = {name:"",company:"",title:"",email:"",phone:""};
  const norm = toHalf(text);
  const lines = norm.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  const K="\\u4e00-\\u9fff", H="\\u3040-\\u309f", KA="\\u30a0-\\u30ff\\u30fc";
  const jp = new RegExp("["+K+H+KA+"]");
  const em = norm.match(/[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}/);
  out.email = em ? em[0] : "";
  let tel = "";
  const phoneRe = /(?:\+?\d{1,3}[-\s]?)?0\d{1,4}[-\(\)\s]?\d{1,4}[-\)\s]?\d{3,4}/;
  for(const ln of lines){
    const isFax=/fax/i.test(ln), isTel=/tel|電話|☎|phone|mobile|携帯/i.test(ln);
    const m=ln.match(phoneRe); if(!m) continue;
    if(isFax && !isTel) continue;
    tel=m[0]; if(isTel) break;
  }
  if(!tel){
    for(const ln of lines){
      if(/fax/i.test(ln) && !/tel|phone|mobile|携帯|電話/i.test(ln)) continue;
      if(!/tel|phone|mobile|携帯|電話/i.test(ln)) continue;
      const m=ln.match(/[+\d][\d\-\(\)\s\.]{7,}\d/); if(m){ tel=m[0]; break; }
    }
  }
  if(tel) out.phone = tel.replace(/[\(\)\s\.]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"");
  const companyRe=/(株式会社|有限会社|合同会社|合資会社|相互会社|\(株\)|（株）|\(有\)|（有）|Inc\.?|Corp\.?|Corporation|Co\.,?\s*Ltd\.?|Company|Limited|Holdings|Group|LLC|LLP)/i;
  const company=lines.find(l=>companyRe.test(l) && !/@/.test(l)); out.company=company||"";
  const titleRe=/(代表取締役|取締役|代表者?|会長|社長|副社長|専務|常務|本部長|事業部長|部長|次長|課長|係長|主任|主査|主幹|参事|室長|店長|工場長|支店長|所長|顧問|フェロー|マネージャー|マネジャー|リーダー|ディレクター|プロデューサー|エンジニア|デザイナー|コンサルタント|アナリスト|スペシャリスト|担当|主席|首席|CEO|CTO|CFO|COO|CMO|VP|President|Vice|Director|Manager|Officer|Engineer|Designer|Consultant|Analyst|Lead|Head|営業.{0,4}部?|企画.{0,4}部?|総務.{0,2}部?|人事.{0,2}部?|経理.{0,2}部?|開発.{0,4}部?|技術.{0,4}部?|製造.{0,2}部?|品質.{0,4}部?|広報.{0,2}部?|事業部|本部)/i;
  const title=lines.find(l=> titleRe.test(l) && l!==company && !/@/.test(l) && l.length<=24 && !companyRe.test(l)); out.title=title||"";
  const isMeta=l=>/@|tel|fax|http|www|〒|\d|mobile|phone|携帯|電話/i.test(l)||companyRe.test(l)||titleRe.test(l);
  let name="";
  const reSpaceName=new RegExp("^["+K+H+KA+"]{1,5}[ ]+["+K+H+KA+"]{1,5}$");
  name=lines.find(l=> reSpaceName.test(l) && l!==company && l!==title);
  if(!name){ const reKanji=new RegExp("^["+K+"]{2,5}$"); name=lines.find(l=> reKanji.test(l)&&!isMeta(l)&&l!==company&&l!==title); }
  if(!name){ const reShort=new RegExp("^["+K+H+KA+" ]{2,8}$"); name=lines.find(l=> reShort.test(l)&&jp.test(l)&&!isMeta(l)&&l!==company&&l!==title); }
  if(!name){ name=lines.find(l=> /^[A-Z][A-Za-z'.\-]+(\s+[A-Z][A-Za-z'.\-]+){1,2}$/.test(l)&&!companyRe.test(l)&&!titleRe.test(l)); }
  out.name=name||"";
  for(const k of ["name","company","title","email","phone"]){
    $("f_"+k).textContent = out[k] || "—";
  }
}
</script>
</body>
</html>
